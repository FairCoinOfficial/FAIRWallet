appId: in.fairco.wallet
productName: FAIRWallet
copyright: Copyright (c) FairCoin

directories:
  output: electron-dist
  buildResources: assets

files:
  - electron/**/*
  - dist/**/*
  - assets/icon.png
  - package.json

extraResources:
  - from: dist
    to: dist
    filter:
      - "**/*"

mac:
  category: public.app-category.finance
  icon: assets/icon.png
  target:
    - dmg

win:
  icon: assets/icon.png
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  icon: assets/icon.png
  category: Finance
  target:
    - deb
    - AppImage

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
